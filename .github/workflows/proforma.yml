name: Proforma — Generar, Firmar y Subir

on:
  push:
    paths:
      - 'nco-guayas.json'
    branches:
      - main
  workflow_dispatch:
    inputs:
      nco:
        description: 'Código NCO específico (vacío = todos los nuevos)'
        required: false
        default: ''
      forzar:
        description: 'Forzar regeneración aunque ya esté procesado'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  proforma:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias del sistema (WeasyPrint)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libpango-1.0-0 libpangoft2-1.0-0 libharfbuzz0b \
            libfontconfig1 libcairo2 libgdk-pixbuf2.0-0 \
            fonts-liberation fonts-noto

      - name: Instalar dependencias Python
        run: |
          pip install weasyprint pyhanko pyhanko-certvalidator pymupdf playwright
          playwright install chromium --with-deps

      - name: Restaurar certificado P12 desde secret
        env:
          P12_B64: ${{ secrets.P12_CERT_B64 }}
        run: |
          mkdir -p /root/.claude/uploads/62158717-1a5c-565b-9ca5-eaa58166a747
          echo "$P12_B64" | base64 -d > /root/.claude/uploads/62158717-1a5c-565b-9ca5-eaa58166a747/73c7eb7f-14775814_identity_0952773976.p12

      - name: Generar y firmar proformas
        env:
          P12_PASS:       ${{ secrets.P12_PASS }}
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          if [ -n "${{ github.event.inputs.nco }}" ]; then
            ARGS="--nco ${{ github.event.inputs.nco }}"
          else
            ARGS="--todos"
          fi
          if [ "${{ github.event.inputs.forzar }}" = "true" ]; then
            ARGS="$ARGS --forzar"
          fi
          python3 generar_proforma.py $ARGS

      - name: Subir proformas al portal SERCOP
        env:
          SERCOP_USER: ${{ secrets.SERCOP_USER }}
          SERCOP_PASS: ${{ secrets.SERCOP_PASS }}
        run: |
          python3 - <<'EOF'
          import json, subprocess, sys, os, re
          from pathlib import Path
          data = json.loads(Path('nco-guayas.json').read_text())
          for proc in data.get('procesos', []):
              codigo = proc.get('codigo', '')
              if not codigo: continue
              safe = re.sub(r'[^\w\-]', '_', codigo)
              pdf = Path(f'output/Proforma_{safe}_PREVIFUEGO_signed.pdf')
              if not pdf.exists(): continue
              print(f'Subiendo {pdf.name}...')
              r = subprocess.run(
                  [sys.executable, 'scripts/upload_proforma.py', '--nco', codigo, '--pdf', str(pdf)],
                  env={**os.environ})
              print('OK' if r.returncode == 0 else f'returncode={r.returncode}')
          EOF

      - name: Guardar PDFs como artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: proformas-${{ github.run_number }}
          path: output/Proforma_*_signed.pdf
          retention-days: 30

      - name: Commit procesados.json
        run: |
          git config user.name  "PREVIFUEGO Bot"
          git config user.email "alejosl0801@gmail.com"
          git add procesados.json nco-vistos-ci.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "bot: actualizar procesados.json $(date -u '+%Y-%m-%d %H:%M UTC')" && git push || true
