name: NCO Scraper — SERCOP Guayas

on:
  schedule:
    - cron: '0 11-23,0-2 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalar dependencias
        run: |
          pip install playwright pymupdf
          playwright install chromium --with-deps

      - name: Correr scraper NCO
        run: python3 scripts/scrape_nco.py
        timeout-minutes: 10

      - name: Commit nco-guayas.json si cambió
        run: |
          git config user.name  "PREVIFUEGO Bot"
          git config user.email "alejosl0801@gmail.com"
          git add nco-guayas.json
          if git diff --cached --quiet; then
            echo "Sin cambios en nco-guayas.json"
          else
            git commit -m "bot: actualizar nco-guayas.json $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi

      - name: Notificar por email si hay procesos nuevos
        if: success()
        env:
          GMAIL_USER:     ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
        run: |
          python3 -c "
import json, os, sys
from pathlib import Path

data = json.loads(Path('nco-guayas.json').read_text())
vistos_path = Path('nco-vistos-ci.json')
vistos = set(json.loads(vistos_path.read_text())) if vistos_path.exists() else set()
nuevos = [p for p in data.get('procesos', []) if p.get('codigo') not in vistos]

if not nuevos:
    print('Sin procesos nuevos')
    sys.exit(0)

print(f'{len(nuevos)} proceso(s) nuevo(s): {[p[\"codigo\"] for p in nuevos]}')
vistos.update(p['codigo'] for p in data.get('procesos', []))
vistos_path.write_text(json.dumps(sorted(vistos), ensure_ascii=False, indent=2))
sys.path.insert(0, '.')
from monitor import build_email_ncos, enviar_email
asunto, html, texto = build_email_ncos(nuevos)
enviar_email(asunto, html, texto)
"
