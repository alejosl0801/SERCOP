name: Monitor NCO Guayas

on:
  schedule:
    - cron: '0 * * * *'   # Cada hora
  workflow_dispatch:        # También manual desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run scraper
        run: python scripts/scrape_nco.py

      - name: Commit results if changed
        run: |
          git config user.name "SERCOP Monitor Bot"
          git config user.email "bot@previfuego"
          git add nco-guayas.json
          if git diff --staged --quiet; then
            echo "Sin cambios en NCO"
          else
            git commit -m "chore: actualizar NCO Guayas [$(date -u '+%Y-%m-%d %H:%M') UTC]"
            git push
          fi
