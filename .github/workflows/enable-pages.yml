name: Activar GitHub Pages

on:
  workflow_dispatch:

permissions:
  pages: write
  contents: read

jobs:
  enable:
    runs-on: ubuntu-latest
    steps:
      - name: Habilitar Pages via API
        run: |
          curl -s -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/alejosl0801/SERCOP/pages \
            -d '{"build_type":"workflow"}' \
            | cat
          echo "Pages habilitado."
